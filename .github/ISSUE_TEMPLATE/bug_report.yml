name: Bug Report
description: Something isn't working as expected
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        **Before submitting**, please scrub any sensitive file paths or
        project names from logs and output.

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python Version
      description: Output of `python3 --version`
      placeholder: "e.g. Python 3.11.9"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install Method
      options:
        - git clone
        - pipx
    validations:
      required: true

  - type: dropdown
    id: tool_affected
    attributes:
      label: Tool / Feature Affected
      options:
        - Claude Code
        - Codex CLI
        - Gemini CLI
        - dashboard
        - other
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `python3 pulse.py ...`
        2. Open the dashboard
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / terminal output
      description: >
        Paste relevant output here. Scrub any sensitive paths
        (e.g. replace your username with `<user>`) before submitting.
      render: text
