name: Publish to PyPI

# Triggers:
#   release/published  — automatic on every new GitHub Release
#   workflow_dispatch  — manual trigger; required for v0.1.0 because its
#                        GitHub Release was created before this workflow
#                        existed. Also used for TestPyPI dry-runs.
#
# PyPI registration is USER-GATED. This workflow only stages the
# infrastructure; see PUBLISHING.md for the one-time setup steps.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target (pypi = production, testpypi = dry-run)'
        required: false
        default: pypi
        type: choice
        options:
          - pypi
          - testpypi

permissions:
  contents: read

jobs:
  # ── 1. Build wheel + sdist ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # IMPORTANT: always upgrade pip before building.
      # A stale pip (≤21.x / setuptools ≤58, pre-PEP 621) will produce a
      # broken UNKNOWN-0.0.0 wheel with no pulse.py. The 'build' frontend
      # is the correct tool; never use 'python setup.py bdist_wheel'.
      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ── 2. Publish (Trusted Publishing — no token required) ─────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    # 'pypi' maps to a GitHub deployment environment that acts as a manual
    # approval gate. The environment must be created in repo Settings →
    # Environments before this job can run. See PUBLISHING.md.
    environment: pypi
    permissions:
      id-token: write   # required for OIDC Trusted Publishing
      contents: read

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      # Production PyPI — runs on release/published trigger or
      # workflow_dispatch with target=pypi (default).
      - name: Publish to PyPI
        if: ${{ github.event_name == 'release' || inputs.target == 'pypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1

      # TestPyPI dry-run — workflow_dispatch with target=testpypi only.
      # Requires a separate Trusted Publisher registration on test.pypi.org.
      # See PUBLISHING.md for registration details.
      - name: Publish to TestPyPI
        if: ${{ inputs.target == 'testpypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
